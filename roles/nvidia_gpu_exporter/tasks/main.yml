---
- name: Ensure --collect.compute-apps is only used with a supported version
  ansible.builtin.assert:
    that:
      - not nvidia_gpu_exporter_collect_compute_apps
        or nvidia_gpu_exporter_version == 'latest'
        or nvidia_gpu_exporter_version is version('1.9.0', '>=')
    fail_msg: >-
      nvidia_gpu_exporter_collect_compute_apps requires nvidia_gpu_exporter_version >= 1.9.0
      (current: {{ nvidia_gpu_exporter_version }})

- name: Preflight
  ansible.builtin.include_tasks:
    file: preflight.yml
  tags:
    - nvidia_gpu_exporter
    - install
    - configure
    - run
    - nvidia_gpu_exporter_install
    - nvidia_gpu_exporter_configure
    - nvidia_gpu_exporter_run

- name: Install
  ansible.builtin.include_role:
    name: prometheus.prometheus._common
    tasks_from: install.yml
  vars:
    _common_local_cache_path: "{{ nvidia_gpu_exporter_local_cache_path }}"
    _common_binaries: "{{ _nvidia_gpu_exporter_binaries }}"
    _common_binary_install_dir: "{{ nvidia_gpu_exporter_binary_install_dir }}"
    _common_binary_url: "{{ nvidia_gpu_exporter_binary_url }}"
    _common_checksums_url: "{{ nvidia_gpu_exporter_checksums_url }}"
    _common_system_group: "{{ nvidia_gpu_exporter_system_group }}"
    _common_system_user: "{{ nvidia_gpu_exporter_system_user }}"
    _common_config_dir: "{{ nvidia_gpu_exporter_config_dir }}"
  tags:
    - nvidia_gpu_exporter
    - install
    - nvidia_gpu_exporter_install

- name: SELinux
  ansible.builtin.include_role:
    name: prometheus.prometheus._common
    tasks_from: selinux.yml
  vars:
    _common_selinux_port: "{{ ('//' ~ nvidia_gpu_exporter_web_listen_address) | ansible.builtin.urlsplit('port') }}"
  when: ansible_facts['selinux'].status == "enabled"
  tags:
    - nvidia_gpu_exporter
    - configure
    - nvidia_gpu_exporter_configure

- name: Configure
  ansible.builtin.include_role:
    name: prometheus.prometheus._common
    tasks_from: configure.yml
  vars:
    _common_system_user: "{{ nvidia_gpu_exporter_system_user }}"
    _common_system_group: "{{ nvidia_gpu_exporter_system_group }}"
    _common_config_dir: "{{ nvidia_gpu_exporter_config_dir }}"
  tags:
    - nvidia_gpu_exporter
    - configure
    - nvidia_gpu_exporter_configure

- name: Ensure Nvidia GPU Exporter is enabled on boot
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
    name: nvidia_gpu_exporter
    enabled: true
    state: started
  when:
    - not ansible_check_mode
  tags:
    - nvidia_gpu_exporter
    - run
    - nvidia_gpu_exporter_run
