---
- name: Copy the nvidia_gpu_exporter systemd service file
  ansible.builtin.template:
    src: nvidia_gpu_exporter.service.j2
    dest: /etc/systemd/system/nvidia_gpu_exporter.service
    owner: root
    group: root
    mode: 0644
  notify: restart nvidia_gpu_exporter

- name: Create nvidia_gpu_exporter config directory
  ansible.builtin.file:
    path: "/etc/nvidia_gpu_exporter"
    state: directory
    owner: root
    group: root
    mode: u+rwX,g+rwX,o=rX

- name: Copy the nvidia_gpu_exporter config file
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/nvidia_gpu_exporter/config.yaml
    owner: root
    group: root
    mode: 0644
  notify: restart nvidia_gpu_exporter

- name: Allow nvidia_gpu_exporter port in SELinux on RedHat OS family
  community.general.seport:
    ports: "{{ nvidia_gpu_exporter_web_listen_address.split(':')[-1] }}"
    proto: tcp
    setype: http_port_t
    state: present
  when:
    - ansible_version.full is version_compare('2.4', '>=')
    - ansible_selinux.status == "enabled"
