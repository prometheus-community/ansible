---
- name: Common preflight
  ansible.builtin.include_role:
    name: prometheus.prometheus._common
    tasks_from: preflight.yml
  vars:
    _common_web_listen_address: "{{ dns_exporter_web_listen_address }}"

- name: Assert collectors are not both disabled and enabled at the same time
  ansible.builtin.assert:
    that:
      - "item not in dns_exporter_enabled_collectors"
  with_items: "{{ dns_exporter_disabled_collectors }}"

- name: Assert that TLS config is correct
  when: dns_exporter_tls_server_config | length > 0
  block:
    - name: Assert that TLS key and cert path are set
      ansible.builtin.assert:
        that:
          - "dns_exporter_tls_server_config.cert_file is defined"
          - "dns_exporter_tls_server_config.key_file is defined"

    - name: Check existence of TLS cert file
      ansible.builtin.stat:
        path: "{{ dns_exporter_tls_server_config.cert_file }}"
      register: __dns_exporter_cert_file

    - name: Check existence of TLS key file
      ansible.builtin.stat:
        path: "{{ dns_exporter_tls_server_config.key_file }}"
      register: __dns_exporter_key_file

    - name: Assert that TLS key and cert are present
      ansible.builtin.assert:
        that:
          - "__dns_exporter_cert_file.stat.exists"
          - "__dns_exporter_key_file.stat.exists"
